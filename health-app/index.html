<!DOCTYPE html>
<html lang="de" data-theme="midnight" data-mode="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Pulse – Deine Gesundheits- &amp; Alltags-App</title>
  <meta name="description" content="Pulse: Kalorien, Gewicht, Schritte, Training, Wetter, Aufgaben und mehr – alles an einem Ort, alle Daten lokal auf deinem Gerät.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b1020">
  <link rel="icon" href="icons/icon-192.png">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pulse">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <main id="page" class="page" aria-live="polite"></main>

    <button id="fab" class="fab" aria-label="Schnell erfassen">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" fill="none"/></svg>
    </button>

    <nav id="tabbar" class="tabbar" aria-label="Hauptnavigation"></nav>
  </div>

  <div id="sheet-root"></div>
  <div id="toast-root" aria-live="assertive"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
